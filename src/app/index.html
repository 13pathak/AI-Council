<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bots Interface</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <!-- View Toggle Toolbar (Absolute Top or part of layout) -->
    <!-- We'll keep layout simple: Grid is default. Controls in Input Bar or Header? 
         User asked for 'Main Toolbar'. Let's put a thin header bar at the top for global view controls.
    -->
    <div id="main-toolbar">
      <span class="app-title">AI Bots</span>
      <div class="view-controls">
        <button id="view-grid" class="active" title="Grid View">⊞</button>
        <button id="view-tab" title="Tabbed View">❐</button>
        <div class="separator" style="width:1px; height:16px; background:#444; margin:0 5px; display:inline-block;">
        </div>
        <button id="restart-all" title="Restart All Bots & Clear Chats">🗑️</button>
      </div>
      <!-- Tab selector (only visible in tab view) -->
      <div id="tab-selector" style="display:none;"></div>
    </div>

    <!-- Grid Container -->
    <div id="bot-grid"></div>

    <!-- Input bar fixed at bottom -->
    <div class="input-container">
      <input type="file" id="file-input" hidden multiple>
      <button id="settings-btn" title="Configure Bots">⚙️</button>
      <button id="attach-btn" title="Attach Image">📎</button>
      <div id="preview-container"
        style="display:none; flex-wrap:wrap; align-items:center; gap:5px; padding:2px; border-radius:4px;">
      </div>
      <textarea id="prompt-input" placeholder="Type a message to all bots..."></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
